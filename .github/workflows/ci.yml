# MCP Go Implementation - Continuous Integration
# This workflow provides comprehensive testing across Go versions and platforms
# following Russ Cox style guidelines and CLAUDE.md requirements

name: CI

on:
  push:
    branches: [ main, next, develop ]
  pull_request:
    branches: [ main, next ]
  workflow_dispatch: # Allow manual triggering

# Set default permissions for security
permissions:
  contents: read
  checks: write
  pull-requests: write

# Cancel in-progress CI runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Go build settings
  CGO_ENABLED: 0
  GO_VERSION_FILE: go.mod
  
  # Test settings
  GOTESTSUM_FORMAT: standard-verbose
  TEST_TIMEOUT: 10m
  
  # Coverage settings
  COVERAGE_THRESHOLD: 45.0

jobs:
  # ============================================================================
  # CODE QUALITY CHECKS
  # ============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Check gofmt formatting
      run: |
        # Check that code is properly formatted
        # Exclude problematic files as per existing pre-commit script
        excluded_patterns="temp/example_server_design_exploration|temp/mock_client_fix.go|exp/schema2go/generator.go|exp/cmd/mcp-tool-graph/main.go"
        go_files=$(git ls-files '*.go' | grep -v -E "$excluded_patterns" || true)
        unformatted_files=""
        if [ -n "$go_files" ]; then
          unformatted_files=$(printf '%s\n' "$go_files" | xargs gofmt -s -l)
        fi
        if [ -n "$unformatted_files" ]; then
          echo "The following files need gofmt -s:"
          echo "$unformatted_files"
          echo ""
          echo "Run: gofmt -s -w ."
          exit 1
        fi

    - name: Run go vet
      run: |
        # Run go vet excluding problematic directories
        go vet $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Run go vet for cmd/mcp
      run: |
        cd cmd/mcp
        GOWORK=off go vet ./...

    - name: Check go mod tidy
      run: |
        # Verify that go.mod and go.sum are tidy
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak
        go mod tidy
        if ! diff -q go.mod go.mod.bak >/dev/null 2>&1 || ! diff -q go.sum go.sum.bak >/dev/null 2>&1; then
          echo "go.mod or go.sum is not tidy. Run: go mod tidy"
          rm go.mod.bak go.sum.bak
          exit 1
        fi
        rm go.mod.bak go.sum.bak

    - name: Check go mod tidy for cmd/mcp
      run: |
        cd cmd/mcp
        cp go.mod go.mod.bak
        cp go.sum go.sum.bak
        GOWORK=off go mod tidy
        if ! diff -q go.mod go.mod.bak >/dev/null 2>&1 || ! diff -q go.sum go.sum.bak >/dev/null 2>&1; then
          echo "cmd/mcp go.mod or go.sum is not tidy. Run: (cd cmd/mcp && GOWORK=off go mod tidy)"
          rm go.mod.bak go.sum.bak
          exit 1
        fi
        rm go.mod.bak go.sum.bak

    - name: Check for binary files
      run: |
        # Ensure no compiled binaries are committed (text executables like shell scripts are fine)
        binary_files=$(
          git ls-files -z | \
            xargs -0 file --mime-type 2>/dev/null | \
            awk -F': ' '$2 ~ /^application\/(octet-stream|x-archive|x-executable|x-mach-binary|x-object|x-pie-executable|x-sharedlib|vnd\.microsoft\.portable-executable)$/ {print $1}'
        )
        if [ -n "$binary_files" ]; then
          echo "Compiled binary files detected in repository:"
          printf '%s\n' "$binary_files"
          echo "Remove binary files as per CLAUDE.md guidelines"
          exit 1
        fi

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m --exclude-dirs=temp

    - name: Run golangci-lint for cmd/mcp
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: cmd/mcp
        args: --timeout=5m --exclude-dirs=temp

  # ============================================================================
  # BUILD VERIFICATION
  # ============================================================================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build all packages
      run: |
        # Build all packages excluding problematic ones
        go build $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Build cmd/mcp module
      run: |
        cd cmd/mcp
        GOWORK=off go build ./...

    - name: Build core tools
      run: |
        echo "Building core tools..."
        echo "Building mcp..."
        (cd cmd/mcp && GOWORK=off go build ./...)
        for tool in cmd/*; do
          if [ -d "$tool" ] && [ -f "$tool/main.go" ]; then
            # Skip tools with their own go.mod (they need separate handling)
            if [ -f "$tool/go.mod" ]; then
              echo "⚠️  Skipping $(basename $tool) (has own go.mod)"
            else
              echo "Building $(basename $tool)..."
              go build "./$tool"
            fi
          fi
        done

    - name: Build experimental tools
      run: |
        echo "Building experimental tools..."
        if [ -d "exp/cmd" ]; then
          cd exp
          for tool in cmd/*; do
            if [ -d "$tool" ] && [ -f "$tool/main.go" ]; then
              # Skip tools with their own go.mod
              if [ -f "$tool/go.mod" ]; then
                echo "⚠️  Skipping exp/$(basename $tool) (has own go.mod)"
              elif go build -tags=k8s "./$tool" 2>/dev/null; then
                echo "✅ Built exp/$(basename $tool)"
              else
                echo "⚠️  Failed to build exp/$(basename $tool) (possibly conditional)"
              fi
            fi
          done
          cd ..
        else
          echo "No experimental tools found"
        fi

    - name: Verify tool functionality
      run: |
        echo "Testing core tool functionality..."

        # Test mcp
        if (cd cmd/mcp && GOWORK=off go run . --help) >/dev/null 2>&1; then
          echo "✅ mcp help works"
        else
          echo "❌ mcp help failed"
          exit 1
        fi
        
        # Test mcp-probe
        if go run ./cmd/mcp-probe --help >/dev/null 2>&1; then
          echo "✅ mcp-probe help works"
        else
          echo "❌ mcp-probe help failed"
          exit 1
        fi
        
        # Test mcp-serve
        if (cd exp && GOWORK=off go run ./cmd/mcp-serve --help) >/dev/null 2>&1; then
          echo "✅ mcp-serve help works"
        else
          echo "❌ mcp-serve help failed"
          exit 1
        fi

  # ============================================================================
  # TEST MATRIX
  # ============================================================================
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Test the supported Go range declared by go.mod and the current toolchain.
        go-version: ['1.23.0', '1.24.2']
        os: [ubuntu-latest, macos-latest]
        include:
          # Add race detector tests for latest Go on Linux
          - go-version: '1.24.2'
            os: ubuntu-latest
            race: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@latest

    - name: Test compilation
      run: |
        # Ensure tests compile
        go test -run="^$" $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Test compilation for cmd/mcp
      run: |
        cd cmd/mcp
        GOWORK=off go test -run="^$" ./...

    - name: Run tests
      run: |
        mkdir -p test-results
        gotestsum --junitfile test-results/unit-tests.xml --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -timeout=${{ env.TEST_TIMEOUT }} \
          $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Run tests for cmd/mcp
      run: |
        mkdir -p test-results
        cd cmd/mcp
        GOWORK=off gotestsum --junitfile "$GITHUB_WORKSPACE/test-results/cmd-mcp-unit-tests.xml" --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -timeout=${{ env.TEST_TIMEOUT }} ./...

    - name: Run race detector tests
      if: matrix.race
      run: |
        echo "Running race detector tests..."
        gotestsum --junitfile test-results/race-tests.xml --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -race -timeout=${{ env.TEST_TIMEOUT }} \
          $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Run race detector tests for cmd/mcp
      if: matrix.race
      run: |
        mkdir -p test-results
        cd cmd/mcp
        GOWORK=off gotestsum --junitfile "$GITHUB_WORKSPACE/test-results/cmd-mcp-race-tests.xml" --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -race -timeout=${{ env.TEST_TIMEOUT }} ./...

    - name: Run synctest validation
      if: matrix.go-version == '1.24.2' && matrix.os == 'ubuntu-latest'
      run: |
        echo "Running synctest validation..."
        GOEXPERIMENT=synctest gotestsum --junitfile test-results/synctest.xml --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -tags=synctest -timeout=${{ env.TEST_TIMEOUT }} \
          $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")

    - name: Run synctest validation for cmd/mcp
      if: matrix.go-version == '1.24.2' && matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p test-results
        cd cmd/mcp
        GOWORK=off env GOEXPERIMENT=synctest gotestsum --junitfile "$GITHUB_WORKSPACE/test-results/cmd-mcp-synctest.xml" --format ${{ env.GOTESTSUM_FORMAT }} -- \
          -tags=synctest -timeout=${{ env.TEST_TIMEOUT }} ./...

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.go-version }}-${{ matrix.os }}
        path: test-results/
        retention-days: 7

  # ============================================================================
  # COVERAGE REPORTING
  # ============================================================================
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [quality, build]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Generate coverage report
      run: |
        mkdir -p coverage
        go test -coverprofile=coverage/root.out -covermode=atomic \
          $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")
        (
          cd cmd/mcp
          GOWORK=off go test -coverprofile="$GITHUB_WORKSPACE/coverage/cmd-mcp.out" -covermode=atomic ./...
        )
        {
          head -n1 coverage/root.out
          tail -n +2 coverage/root.out
          tail -n +2 coverage/cmd-mcp.out
        } > coverage/coverage.out

    - name: Generate coverage HTML report
      run: |
        go tool cover -html=coverage/coverage.out -o coverage/coverage.html

    - name: Check coverage threshold
      run: |
        total_coverage=$(go tool cover -func=coverage/coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${total_coverage}%"
        
        # Compare with threshold
        if [ $(echo "$total_coverage >= ${{ env.COVERAGE_THRESHOLD }}" | bc) -eq 1 ]; then
          echo "✅ Coverage ${total_coverage}% meets threshold ${{ env.COVERAGE_THRESHOLD }}%"
        else
          echo "⚠️  Coverage ${total_coverage}% below threshold ${{ env.COVERAGE_THRESHOLD }}%"
          echo "This is a warning, not a failure - coverage is trending upward"
        fi

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: coverage/coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 30

  # ============================================================================
  # INTEGRATION TESTS
  # ============================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build tools for integration testing
      run: |
        # Build required tools
        go build ./cmd/mcp-probe
        (
          cd exp
          GOWORK=off go build ./cmd/mcp-serve
          GOWORK=off go build ./cmd/mcp-shadow
          GOWORK=off go build ./cmd/mcp-replay
          GOWORK=off go build ./cmd/mcpdiff
        )

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        
        # Test basic server functionality
        (
          cd exp
          env GOWORK=off timeout 10s go run ./cmd/mcp-serve --stdio-timeout=5s
        ) &
        sleep 2
        pkill -f "go run ./cmd/mcp-serve" || true
        
        echo "✅ Integration tests completed"

    - name: Run mcpscripttest tests
      run: |
        if [ -d "testing/mcpscripttest" ]; then
          echo "Running mcpscripttest tests..."
          cd testing/mcpscripttest
          go test -timeout=5m ./...
          cd ../..
        fi

  # ============================================================================
  # SECURITY CHECKS
  # ============================================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Run gosec security scanner
      run: |
        echo "Installing gosec..."
        go install github.com/securego/gosec/v2/cmd/gosec@latest

        echo "Running gosec scan..."
        mkdir -p security-reports

        # Run gosec with SARIF output for GitHub Security
        gosec -severity medium -confidence medium -exclude-generated \
          -fmt sarif -out security-reports/gosec.sarif ./... || {
          echo "⚠️  gosec found security issues (non-blocking)"
        }

        # Run gosec with text output for logs
        gosec -severity medium -confidence medium -exclude-generated \
          -fmt text ./... || {
          echo "⚠️  gosec found security issues (non-blocking)"
        }

        (
          cd cmd/mcp
          GOWORK=off gosec -severity medium -confidence medium -exclude-generated \
            -fmt sarif -out "$GITHUB_WORKSPACE/security-reports/cmd-mcp-gosec.sarif" ./... || {
            echo "⚠️  cmd/mcp gosec found security issues (non-blocking)"
          }
          GOWORK=off gosec -severity medium -confidence medium -exclude-generated \
            -fmt text ./... || {
            echo "⚠️  cmd/mcp gosec found security issues (non-blocking)"
          }
        )

    - name: Upload gosec SARIF report
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: security-reports/gosec.sarif
        category: gosec

    - name: Upload cmd/mcp gosec SARIF report
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: security-reports/cmd-mcp-gosec.sarif
        category: gosec-cmd-mcp

    - name: Run Go vulnerability check
      run: |
        echo "Installing govulncheck..."
        go install golang.org/x/vuln/cmd/govulncheck@latest

        echo "Running govulncheck scan..."
        govulncheck -json ./... > security-reports/govulncheck.json || {
          echo "⚠️  govulncheck found vulnerabilities (non-blocking)"
        }

        # Also run with text output
        govulncheck ./... || {
          echo "⚠️  govulncheck found vulnerabilities (non-blocking)"
        }

        (
          cd cmd/mcp
          GOWORK=off govulncheck -json ./... > "$GITHUB_WORKSPACE/security-reports/cmd-mcp-govulncheck.json" || {
            echo "⚠️  cmd/mcp govulncheck found vulnerabilities (non-blocking)"
          }
          GOWORK=off govulncheck ./... || {
            echo "⚠️  cmd/mcp govulncheck found vulnerabilities (non-blocking)"
          }
        )

    - name: Upload security scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: security-reports/
        retention-days: 30

  # ============================================================================
  # FINAL STATUS
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, build, test, coverage, integration, security]
    if: always()

    steps:
    - name: Check overall status
      run: |
        echo "Quality: ${{ needs.quality.result }}"
        echo "Build: ${{ needs.build.result }}"  
        echo "Test: ${{ needs.test.result }}"
        echo "Coverage: ${{ needs.coverage.result }}"
        echo "Integration: ${{ needs.integration.result }}"
        echo "Security: ${{ needs.security.result }}"
        
        if [[ "${{ needs.quality.result }}" == "success" && \
              "${{ needs.build.result }}" == "success" && \
              "${{ needs.test.result }}" == "success" && \
              "${{ needs.coverage.result }}" == "success" && \
              "${{ needs.integration.result }}" == "success" && \
              "${{ needs.security.result }}" == "success" ]]; then
          echo "🎉 All CI checks passed!"
          echo "✅ Ready for merge following Go project commit standards"
        else
          echo "❌ Some CI checks failed"
          exit 1
        fi
