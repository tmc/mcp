name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GO_VERSION_FILE: go.mod
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
        
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-release-${{ hashFiles('**/go.sum', '**/go.work.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-release-
          
    - name: Run tests
      run: |
        go test -race \
          $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")
      
    - name: Build binaries
      run: |
        mkdir -p dist
        
        # Build core tools for multiple platforms
        platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
        
        for platform in "${platforms[@]}"; do
          IFS='/' read -r -a array <<< "$platform"
          GOOS="${array[0]}"
          GOARCH="${array[1]}"
          
          echo "Building for $GOOS/$GOARCH..."
          
          # Build each core tool
          for tool in cmd/*; do
            if [ -d "$tool" ] && [ -f "$tool/main.go" ]; then
              if [ -f "$tool/go.mod" ]; then
                echo "  Skipping $(basename "$tool") (nested module)"
                continue
              fi
              tool_name=$(basename "$tool")
              output_name="$tool_name-$GOOS-$GOARCH"
              
              if [ "$GOOS" = "windows" ]; then
                output_name="$output_name.exe"
              fi
              
              echo "  Building $tool_name -> $output_name"
              GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="-s -w" -o "dist/$output_name" "$tool"
            fi
          done
        done
        
    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        
    - name: Generate changelog
      run: |
        version="${RELEASE_TAG#v}"
        if [ -f CHANGELOG.md ]; then
          # Extract changelog for this version if it exists.
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" || $0 ~ "^## " version "([[:space:]]|$)" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/changelog.txt
        fi
        if [ ! -s /tmp/changelog.txt ]; then
          # Fall back to git history when a matching changelog entry is not present.
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$previous_tag" ]; then
            git log --pretty=format:"* %s" "$previous_tag"..HEAD > /tmp/changelog.txt
          else
            git log --pretty=format:"* %s" > /tmp/changelog.txt
          fi
        fi
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Release ${{ env.RELEASE_TAG }}
        body_path: /tmp/changelog.txt
        files: |
          dist/*
        draft: false
        prerelease: ${{ contains(env.RELEASE_TAG, 'rc') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'alpha') }}
        
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=${{ env.RELEASE_TAG }}
          type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
          type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
          type=semver,pattern={{major}},value=${{ env.RELEASE_TAG }}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
