# Pre-commit hooks for MCP Go implementation
# Following Russ Cox style guidelines and CLAUDE.md requirements
# Install: pip install pre-commit && pre-commit install

repos:
  # ============================================================================
  # GENERAL FILE CHECKS
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Prevent large files and binary files (per CLAUDE.md)
      - id: check-added-large-files
        args: ['--maxkb=500']
      
      # Check for binary files in repository
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      
      # Basic file hygiene
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      
      # Text file formatting
      - id: end-of-file-fixer
        exclude: '\.mcp$|\.txt$|testdata/.*\.txt$'  # Exclude MCP trace files and test data
      - id: trailing-whitespace
        exclude: '\.mcp$|\.txt$|testdata/.*\.txt$'  # Exclude MCP trace files and test data
      
      # YAML validation
      - id: check-yaml
        files: '\.(yml|yaml)$'
        exclude: 'temp/|examples/'

  # ============================================================================
  # GO-SPECIFIC HOOKS
  # ============================================================================
  - repo: local
    hooks:
      # Check for binary files being committed (per CLAUDE.md requirement)
      - id: check-binary-files
        name: Check for binary files
        entry: bash
        args:
          - -c
          - |
            if git diff --cached --name-only | xargs -I {} file {} 2>/dev/null | grep -q "executable\|binary"; then
              echo "Binary files detected in staging area:"
              git diff --cached --name-only | xargs -I {} file {} | grep "executable\|binary"
              echo "Please unstage binary files as per CLAUDE.md guidelines"
              exit 1
            fi
        language: system
        always_run: true

      # Format Go code with gofmt
      - id: gofmt
        name: Format Go code
        entry: bash
        args:
          - -c
          - |
            if [ "$#" -eq 0 ]; then
              exit 0
            fi
            unformatted_files=$(gofmt -s -l "$@")
            if [ -n "$unformatted_files" ]; then
              echo "The following files need gofmt -s:"
              echo "$unformatted_files"
              echo ""
              echo "Auto-fixing formatting..."
              printf '%s\n' "$unformatted_files" | xargs gofmt -s -w
            fi
          - --
        language: system
        files: '\.go$'
        exclude: 'temp/example_server_design_exploration|temp/mock_client_fix.go|exp/schema2go/generator.go|exp/cmd/mcp-tool-graph/main.go'

      # Run go vet
      - id: go-vet
        name: Go vet
        entry: bash
        args:
          - -c
          - |
            # Run go vet excluding problematic directories
            echo "Running go vet..."
            go vet $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")
            echo "Running go vet for cmd/mcp..."
            (cd cmd/mcp && GOWORK=off go vet ./...)
        language: system
        files: '\.go$'
        exclude: 'temp/'

      # Check go mod tidy
      - id: go-mod-tidy
        name: Check go mod tidy
        entry: bash
        args:
          - -c
          - |
            echo "Checking go mod tidy..."
            cp go.mod go.mod.bak
            cp go.sum go.sum.bak
            go mod tidy
            if ! diff -q go.mod go.mod.bak >/dev/null 2>&1 || ! diff -q go.sum go.sum.bak >/dev/null 2>&1; then
              echo "go.mod or go.sum is not tidy."
              echo "Auto-running: go mod tidy"
              rm go.mod.bak go.sum.bak
              # File has been fixed by go mod tidy above
              exit 0
            fi
            rm go.mod.bak go.sum.bak
            cd cmd/mcp
            cp go.mod go.mod.bak
            cp go.sum go.sum.bak
            GOWORK=off go mod tidy
            if ! diff -q go.mod go.mod.bak >/dev/null 2>&1 || ! diff -q go.sum go.sum.bak >/dev/null 2>&1; then
              echo "cmd/mcp go.mod or go.sum is not tidy."
              echo "Auto-running: (cd cmd/mcp && GOWORK=off go mod tidy)"
              rm go.mod.bak go.sum.bak
              # File has been fixed by go mod tidy above
              exit 0
            fi
            rm go.mod.bak go.sum.bak
        language: system
        files: 'go\.(mod|sum)$'

      # Test compilation of packages
      - id: go-build-test
        name: Test Go compilation
        entry: bash
        args:
          - -c
          - |
            echo "Testing package compilation..."
            # Build all packages excluding problematic ones
            go build $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")
            (cd cmd/mcp && GOWORK=off go build ./...)
            echo "Testing test compilation..."
            # Ensure tests compile
            go test -run="^$" $(go list ./... | grep -v "temp/example_server_design_exploration" | grep -v "temp/mock_client_fix")
            (cd cmd/mcp && GOWORK=off go test -run="^$" ./...)
        language: system
        files: '\.go$'
        exclude: 'temp/'

      # Build core tools
      - id: go-build-tools
        name: Build core tools
        entry: bash
        args:
          - -c
          - |
            echo "Building core tools..."
            echo "  Building mcp..."
            (cd cmd/mcp && GOWORK=off go build ./...) || exit 1
            for tool in cmd/*; do
              if [ -d "$tool" ] && [ -f "$tool/main.go" ]; then
                if [ -f "$tool/go.mod" ]; then
                  continue
                fi
                echo "  Building $(basename $tool)..."
                go build "$tool" || exit 1
              fi
            done
        language: system
        files: 'cmd/.*\.go$'

      # Smoke test core functionality
      - id: smoke-test
        name: Smoke test core tools
        entry: bash
        args:
          - -c
          - |
            echo "Running smoke tests..."

            # Test mcp help
            if ! (cd cmd/mcp && GOWORK=off go run . --help) >/dev/null 2>&1; then
              echo "❌ mcp help failed"
              exit 1
            fi
            echo "  ✅ mcp help works"
            
            # Test mcp-probe help
            if ! go run ./cmd/mcp-probe --help >/dev/null 2>&1; then
              echo "❌ mcp-probe help failed"
              exit 1
            fi
            echo "  ✅ mcp-probe help works"
            
            # Test mcp-serve help  
            if ! (cd exp && GOWORK=off go run ./cmd/mcp-serve --help) >/dev/null 2>&1; then
              echo "❌ mcp-serve help failed"
              exit 1
            fi
            echo "  ✅ mcp-serve help works"
        language: system
        files: 'cmd/.*\.go$'
        pass_filenames: false

  # ============================================================================
  # SECURITY AND LINTING
  # ============================================================================
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      # Go security scanning
      - id: go-mod-vendor
        args: [-v]
        exclude: 'exp/|temp/'
        
      # Additional go vet-style checks
      - id: go-cyclo
        args: [-over=15]
        exclude: 'temp/|testdata/'
        
      # Check for common Go anti-patterns
      - id: go-unit-tests
        args: [-timeout=5m]
        exclude: 'temp/example_server_design_exploration|temp/mock_client_fix'

  # ============================================================================
  # CONFIGURATION FILES
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint]
        exclude: 'temp/|examples/'

# ============================================================================
# PRE-COMMIT CONFIGURATION
# ============================================================================
default_stages: [commit]
fail_fast: false

# Exclude patterns for all hooks
exclude: |
  (?x)^(
    temp/.*|
    \.git/.*|
    \.mcp$|
    traces/.*\.mcp$|
    coverage\.out$|
    go\.sum$
  )$

# CI configuration
ci:
  autofix_prs: true
  autofix_commit_msg: |
    all: fix formatting and linting issues
    
    Auto-fix by pre-commit.ci
  
  autoupdate_commit_msg: |
    all: update pre-commit hooks
    
    Auto-update by pre-commit.ci
  
  autoupdate_schedule: weekly
  skip: [go-unit-tests, smoke-test]  # Skip expensive tests in CI autofix
