name: Test mcptrace-to-otel

on:
  push:
    branches: [ main ]
    paths:
      - 'cmd/mcptrace-to-otel/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'cmd/mcptrace-to-otel/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Change to mcptrace-to-otel directory
      run: cd cmd/mcptrace-to-otel
    
    - name: Install dependencies
      working-directory: ./cmd/mcptrace-to-otel
      run: |
        go mod download
        go mod verify
    
    - name: Run tests
      working-directory: ./cmd/mcptrace-to-otel
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Build
      working-directory: ./cmd/mcptrace-to-otel
      run: go build -v .
    
    - name: Test stdout export
      working-directory: ./cmd/mcptrace-to-otel
      run: |
        ./mcptrace-to-otel -f example.mcp -type stdout
    
    - name: Start Jaeger for integration test
      run: |
        docker run -d --name jaeger \
          -e COLLECTOR_OTLP_ENABLED=true \
          -p 14268:14268 \
          jaegertracing/all-in-one:2.2
        sleep 5
    
    - name: Test Jaeger export
      working-directory: ./cmd/mcptrace-to-otel
      run: |
        ./mcptrace-to-otel -f example.mcp -type jaeger -endpoint http://localhost:14268/api/traces
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./cmd/mcptrace-to-otel/coverage.out
        flags: mcptrace-to-otel
        name: mcptrace-to-otel-coverage
    
    - name: Cleanup
      if: always()
      run: |
        docker stop jaeger || true
        docker rm jaeger || true